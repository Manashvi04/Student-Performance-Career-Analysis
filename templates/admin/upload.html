{% extends "base_a.html" %}

{% block title %}Upload Students{% endblock %}

{% block content %}

<style>
.upload-container{
display:flex;
gap:20px;
margin-top:20px;
}

.upload-box{
flex:1;
background:white;
padding:20px;
border-left:5px solid #1e3c72;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.upload-box h3{
color:#1e3c72;
}

select,input{
width:100%;
padding:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:8px 14px;
background:#1e3c72;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#16325c;
}
</style>

<h2>Upload Student Data</h2>

<label>Select Academic Year</label>
<select id="year">
<option value="">Select Year</option>
{% for y in years %}
<option value="{{ y }}">{{ y }}</option>
{% endfor %}
</select>

<br><br>

<div class="upload-container">

<!-- IT -->
<div class="upload-box">
<h3>IT Students</h3>
<input type="file" id="itFile" accept=".xlsx,.xls">
<button type="button" onclick="uploadFile('IT')">Upload</button>
</div>

<!-- CSE -->
<div class="upload-box">
<h3>CSE Students</h3>
<input type="file" id="cseFile" accept=".xlsx,.xls">
<button type="button" onclick="uploadFile('CSE')">Upload</button>
</div>

<!-- CE -->
<div class="upload-box">
<h3>CE Students</h3>
<input type="file" id="ceFile" accept=".xlsx,.xls">
<button type="button" onclick="uploadFile('CE')">Upload</button>
</div>

</div>

<br>
<div id="result"></div>

<script>
function uploadFile(dept){

let year = document.getElementById("year").value;

if(year === ""){
alert("Please select academic year");
return;
}

let fileInput;

if(dept === "IT"){
fileInput = document.getElementById("itFile");
}
else if(dept === "CSE"){
fileInput = document.getElementById("cseFile");
}
else if(dept === "CE"){
fileInput = document.getElementById("ceFile");
}
else{
alert("Invalid department");
return;
}

const file = fileInput.files[0];

if(!file){
alert("Please select Excel file");
return;
}

/* ✅ File type validation */
if(!file.name.endsWith(".xlsx") && !file.name.endsWith(".xls")){
alert("Only Excel files allowed");
return;
}

const formData = new FormData();
formData.append("file", file);
formData.append("department", dept);
formData.append("year", year);

/* ✅ Show loading */
document.getElementById("result").innerHTML = "<b style='color:blue'>Uploading...</b>";

fetch("/admin/upload_students_excel",{
method:"POST",
body:formData
})
.then(res => {
if(!res.ok){
throw new Error("Server error");
}
return res.json();
})
.then(data => {
document.getElementById("result").innerHTML =
"<b style='color:green'>" + data.message + "</b>";
})
.catch(err => {
console.error("Upload Error:", err);
document.getElementById("result").innerHTML =
"<b style='color:red'>Upload failed. Check console.</b>";
});
}
</script>

{% endblock %}
