<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Performance System | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
align-items:center;
justify-content:center;
}

.login-container{
background:#ffffff;
width:380px;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.login-container h2{
text-align:center;
margin-bottom:10px;
color:#1e3c72;
}

.login-container p{
text-align:center;
margin-bottom:25px;
color:#666;
font-size:14px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-size:14px;
color:#333;
}

.form-group input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
font-size:14px;
}

.form-group input:focus{
border-color:#1e3c72;
}

.login-btn{
width:100%;
padding:12px;
background:#1e3c72;
color:#fff;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

.login-btn:hover{
background:#16325c;
}

.show-password{
font-size:12px;
margin-top:5px;
cursor:pointer;
color:#1e3c72;
}

/* ERROR ALERT BOX */

.alert-error{
background:#ffe6e6;
border:1px solid red;
color:#b30000;
padding:10px;
border-radius:6px;
margin-bottom:15px;
text-align:center;
font-size:14px;
display:none;
}

</style>
</head>

<body>

<div class="login-container">

<h2>Student Performance System</h2>
<p>Login to access your dashboard</p>

<!-- ERROR MESSAGE AREA -->

<div id="error-msg" class="alert-error">
{% if error %}
{{ error }}
{% endif %}
</div>

<form method="POST" action="/login" onsubmit="return validateLogin()">

<div class="form-group">
<label>Email ID</label>
<input type="email" id="email" name="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" name="password" placeholder="Enter your password">
<div class="show-password" onclick="togglePassword()">Show Password</div>
</div>

<button class="login-btn" type="submit">Login</button>

</form>

<div style="text-align:center;margin-top:15px;font-size:13px;">
<a href="#">Forgot Password?</a>
</div>

<div style="text-align:center;margin-top:20px;font-size:12px;color:#999;">
© 2026 Student Performance & Career Analysis System
</div>

</div>

<script>

function validateLogin(){

let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();
let error=document.getElementById("error-msg");

if(email===""){
error.style.display="block";
error.innerHTML="⚠ Please enter your email";
return false;
}

if(password===""){
error.style.display="block";
error.innerHTML="⚠ Please enter your password";
return false;
}

return true;

}

function togglePassword(){

const passwordField=document.getElementById("password");

if(passwordField.type==="password"){
passwordField.type="text";
}else{
passwordField.type="password";
}

}

</script>

</body>
</html>
