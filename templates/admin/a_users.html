{% extends "base_a.html" %}

{% block title %}User Management{% endblock %}

{% block content %}

<div class="section">

<h3>All Users</h3>

<button onclick="loadUsers()">Refresh Users</button>

<br><br>

<div id="userList"></div>

</div>

<script>

function loadUsers(){

  fetch("/get_users")
  .then(res => res.json())
  .then(data => {

    let html = "<table border='1' cellpadding='8'>";
    html += "<tr><th>ID</th><th>Email</th><th>Role</th></tr>";

    data.users.forEach(user => {

      html += `<tr>
        <td>${user.id}</td>
        <td>${user.email}</td>
        <td>${user.role}</td>
      </tr>`;

    });

    html += "</table>";

    document.getElementById("userList").innerHTML = html;

  });

}

</script>

{% endblock %}
