{% extends "base_s.html" %}

{% block title %}Attendance{% endblock %}

{% block content %}

<style>

h2{
color:#1e3c72;
}

.attendance-table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.1);
border-radius:8px;
overflow:hidden;
}

.attendance-table th{
background:#1e3c72;
color:white;
padding:12px;
text-align:left;
}

.attendance-table td{
padding:12px;
border-bottom:1px solid #eee;
}

.attendance-table tr:hover{
background:#f5f7fb;
}

.percentage-good{
color:green;
font-weight:bold;
}

.percentage-warning{
color:orange;
font-weight:bold;
}

.percentage-low{
color:red;
font-weight:bold;
}

</style>

<h2>Attendance Record</h2>

<table class="attendance-table">

<thead>
<tr>
<th>Subject</th>
<th>Type</th>
<th>Attended</th>
<th>Total Lectures</th>
<th>Percentage</th>
</tr>
</thead>

<tbody id="attendanceBody">
</tbody>

</table>


<script>

const attendanceData = [

{subject:"Mathematics", type:"Lecture", attended:25, total:30},
{subject:"Python", type:"Lecture", attended:28, total:30},
{subject:"Python", type:"Lab", attended:12, total:14},
{subject:"DBMS", type:"Lecture", attended:24, total:30},
{subject:"Operating Systems", type:"Lecture", attended:20, total:30},
{subject:"Computer Networks", type:"Lab", attended:10, total:14}

]

const tbody = document.getElementById("attendanceBody")

attendanceData.forEach(row => {

let percent = ((row.attended / row.total) * 100).toFixed(1)

let className = "percentage-good"

if(percent < 75){
className = "percentage-warning"
}

if(percent < 60){
className = "percentage-low"
}

const tr = document.createElement("tr")

tr.innerHTML = `
<td>${row.subject}</td>
<td>${row.type}</td>
<td>${row.attended}</td>
<td>${row.total}</td>
<td class="${className}">${percent}%</td>
`

tbody.appendChild(tr)

})

</script>

{% endblock %}
