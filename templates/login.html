{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your details to access your portal</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="role">Login As</label>
                <select id="role" name="role" required>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <div class="form-group">
                <label for="user_id">Student ID / Faculty Email</label>
                <input type="text" id="user_id" name="user_id" placeholder="e.g. 21CE001 or faculty@charusat.ac.in" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your Password" required>
            </div>

            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <div class="login-footer">
            <p>Note: Passwords are generated and provided by the Administrator.</p>
        </div>
    </div>
</div>
{% endblock %}
