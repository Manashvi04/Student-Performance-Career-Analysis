{% extends "base_s.html" %}

{% block title %}Student Profile{% endblock %}

{% block content %}

<style>
body{
font-family:Segoe UI;
background:#f4f6fb;
margin:0;
padding:40px;
}

.container{
max-width:950px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
color:#2a5298;
text-align:center;
margin-bottom:20px;
}

.section-title{
margin-top:25px;
border-bottom:2px solid #eee;
padding-bottom:5px;
color:#444;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

input:disabled{
background:#f2f2f2;
}

.profile-photo{
text-align:center;
margin-bottom:20px;
}

.profile-photo img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #2a5298;
}

.btn{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.edit-btn{
background:#ff9800;
color:white;
}

.save-btn{
background:#2a5298;
color:white;
display:none;
}

.btn-container{
text-align:center;
}
</style>

<div class="container">

<h2>Student Profile</h2>

<div class="profile-photo">
<img src="{{ url_for('static', filename='student.png') }}">
</div>

<form id="profileForm">

<!-- BASIC -->
<h3 class="section-title">Academic Information</h3>
<div class="form-grid">
<input name="student_id" placeholder="Student ID" readonly>
<input name="email" placeholder="College Email" readonly>

<input name="name" placeholder="Full Name" readonly>
<input type="date" name="dob" readonly>

<input name="branch" placeholder="Branch" readonly>
<input name="program" placeholder="Program" readonly>

<input name="year" placeholder="Academic Year" readonly>
<input name="admission_date" placeholder="Admission Date" readonly>
</div>

<!-- STUDENT -->
<h3 class="section-title">Student Details</h3>
<div class="form-grid">

<input name="father_name" placeholder="Father's Name">
<input name="mother_name" placeholder="Mother's Name">

<input name="parent_phone" placeholder="Parent Phone">
<input name="student_phone" placeholder="Student Phone">

<input name="blood_group" placeholder="Blood Group">
<input name="admission_year" placeholder="Admission Year">

<input name="personal_email" placeholder="Student Personal Email">
<input name="parent_email" placeholder="Parent Email">

<input name="tenth_percent" placeholder="10th Percentage">
<input name="twelfth_percent" placeholder="12th Percentage">

<input name="acpc_rank" placeholder="ACPC Rank">
</div>

<!-- GUARDIAN -->
<h3 class="section-title">Guardian Information</h3>
<div class="form-grid">
<input name="guardian_name" placeholder="Guardian Name">
<input name="guardian_phone" placeholder="Phone Number">

<input name="guardian_occupation" placeholder="Occupation">
<input name="guardian_qualification" placeholder="Qualification">

<input name="guardian_relation" placeholder="Relation">
<input name="guardian_address" placeholder="Address">
</div>

<h3 class="section-title">Change Password</h3>

<div class="form-grid">
<input type="password" id="old_password" placeholder="Old Password">
<input type="password" id="new_password" placeholder="New Password">
</div>

<div class="btn-container">
<button type="button" class="btn" onclick="changePassword()" style="background:#8e44ad;color:white;">
Change Password
</button>
</div>

<div class="btn-container">
<button type="button" class="btn edit-btn" onclick="enableEdit()">
Update
</button>

<button type="submit" class="btn save-btn" id="saveBtn">
Save
</button>
</div>

</form>

</div>

<script>

const form = document.getElementById("profileForm");
const saveBtn = document.getElementById("saveBtn");

/* LOAD DATA */
window.onload = async () => {

try{
const res = await fetch("/student/get_profile");
const data = await res.json();

/* Fill form */
Object.keys(data).forEach(key=>{
if(form.elements[key]){
form.elements[key].value = data[key];
}
});
}catch(err){
console.error(err);
}

/* Disable all fields initially */
disableAllFields();

};


/* FUNCTION: DISABLE ALL */
function disableAllFields(){
[...form.elements].forEach(el=>{
if(el.name){
el.disabled = true;
}
});
}


/* ENABLE EDIT */
function enableEdit(){

const editableFields = [
"father_name","mother_name","parent_phone","student_phone",
"blood_group","admission_year","personal_email","parent_email",
"tenth_percent","twelfth_percent","acpc_rank",
"guardian_name","guardian_phone","guardian_occupation",
"guardian_qualification","guardian_relation","guardian_address"
];

[...form.elements].forEach(el=>{
if(editableFields.includes(el.name)){
el.disabled = false;
}
});

saveBtn.style.display = "inline-block";
}


/* SAVE */
form.onsubmit = async (e)=>{

e.preventDefault();

const data = {};

[...form.elements].forEach(el=>{
if(el.name){
data[el.name] = el.value;
}
});

try{
const res = await fetch("/student/update_profile",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
});

const result = await res.json();
alert(result.message);

/* 🔥 IMPORTANT FIX */
disableAllFields();        // lock again
saveBtn.style.display = "none";

}catch(err){
alert("Error saving");
}

};

async function changePassword(){

const oldPass = document.getElementById("old_password").value;
const newPass = document.getElementById("new_password").value;

if(!oldPass || !newPass){
showPopup("Please fill both fields");
return;
}

const res = await fetch("/student/change_password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
old_password: oldPass,
new_password: newPass
})
});

const data = await res.json();
showPopup(data.message);
}

</script>

{% endblock %}
