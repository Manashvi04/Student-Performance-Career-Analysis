{% extends "base_s.html" %}

{% block title %}Performance Analysis{% endblock %}

{% block content %}

<style>

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:#fff;
padding:20px;
border-left:5px solid #1e3c72;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.summary{
background:#fff;
padding:20px;
border-left:5px solid #1e3c72;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

ul{
padding-left:20px;
}

li{
margin-bottom:8px;
}

</style>

<h2>Performance Analysis</h2>

<div class="cards">

<div class="card">
<h3>Strong Subjects</h3>
<ul id="strongList"></ul>
</div>

<div class="card">
<h3>Weak Subjects</h3>
<ul id="weakList"></ul>
</div>

</div>

<div class="summary">

<h3>Performance Summary</h3>
<p id="summaryText"></p>

</div>

<script>

const subjects = [
{name:"Python", marks:88},
{name:"DBMS", marks:82},
{name:"Mathematics", marks:85},
{name:"Operating Systems", marks:65},
{name:"Computer Networks", marks:68}
]

const strongList = document.getElementById("strongList")
const weakList = document.getElementById("weakList")

subjects.forEach(s => {

const li = document.createElement("li")
li.textContent = s.name + " (" + s.marks + ")"

if(s.marks >= 80)
{
strongList.appendChild(li)
}
else if(s.marks < 70)
{
weakList.appendChild(li)
}

})

document.getElementById("summaryText").textContent =
"The student performs strongly in programming and analytical subjects. Improvement is required in core system subjects to enhance overall academic performance."

</script>

{% endblock %}
