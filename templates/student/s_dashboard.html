{% extends "base_s.html" %}

{% block title %}Student Dashboard{% endblock %}

{% block content %}

<style>
.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-left:5px solid #1e3c72;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
color:#555;
}

.card p{
font-size:24px;
font-weight:bold;
color:#1e3c72;
}

.charts{
display:flex;
gap:20px;
margin-top:30px;
}

.chart-box{
flex:1;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>

<h2>Welcome, {{ session.get('user_email','Student') }}</h2>

<!-- CARDS -->
<div class="cards">

<div class="card">
<h3>CGPA</h3>
<p id="cgpa">--</p>
</div>

<div class="card">
<h3>Attendance</h3>
<p id="attendance">--</p>
</div>

<div class="card">
<h3>Performance</h3>
<p id="performance">--</p>
</div>

</div>

<!-- CHARTS -->
<div class="charts">

<div class="chart-box">
<h3>Subject-wise Marks</h3>
<canvas id="marksChart"></canvas>
</div>

<div class="chart-box">
<h3>Attendance Trend</h3>
<canvas id="attendanceChart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

async function loadDashboard(){

try{

const res = await fetch("/student/dashboard_data");
const data = await res.json();

/* CARDS */
document.getElementById("cgpa").innerText = data.cgpa || 0;
document.getElementById("attendance").innerText = (data.avg_attendance || 0) + "%";
document.getElementById("performance").innerText = data.performance || "N/A";

/* MARKS CHART */
new Chart(document.getElementById('marksChart'), {
type:'bar',
data:{
labels:data.subjects,
datasets:[{
label:'Marks',
data:data.marks,
backgroundColor:'#1e3c72'
}]
},
options:{
responsive:true,
plugins:{
legend:{display:true}
}
}
});

/* ATTENDANCE CHART */
new Chart(document.getElementById('attendanceChart'), {
type:'line',
data:{
labels:data.semesters,
datasets:[{
label:'Attendance %',
data:data.attendance,
borderColor:'#1e3c72',
fill:false,
tension:0.3
}]
},
options:{
responsive:true,
plugins:{
legend:{display:true}
}
}
});

}catch(err){
console.error("Dashboard error:", err);
}

}

loadDashboard();

</script>

{% endblock %}
