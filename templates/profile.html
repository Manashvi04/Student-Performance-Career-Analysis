{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>My Profile</h1>
    <p>Manage your account settings and view your details.</p>
</div>

<div class="profile-container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;">
            <div style="width: 80px; height: 80px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold;">
                {{ profile.name[0] if profile.name else '?' }}
            </div>
            <div>
                <h2 style="font-size: 1.5rem; color: var(--text-main);">{{ profile.name }}</h2>
                <span class="user-badge" style="background: #e5e7eb; padding: 0.25rem 0.75rem; border-radius: 1rem; color: #4b5563;">{{ profile.role|title }}</span>
            </div>
        </div>

        <form action="{{ url_for('profile') }}" method="POST">
            <div class="form-group">
                <label>ID Number</label>
                <input type="text" value="{{ profile.id }}" disabled style="background-color: #f3f4f6; cursor: not-allowed;">
                <small style="color: grey;">ID cannot be changed</small>
            </div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ profile.name }}" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ profile.email }}" required>
            </div>
            
            {% if profile.role == 'student' %}
            <div class="form-group">
                <label>College / University</label>
                <input type="text" name="college" value="{{ profile.college }}">
            </div>

            <div class="form-group">
                <label>Department (B.Tech Specialities)</label>
                <select name="department" required style="width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #cbd5e1;">
                    <option value="" {% if not profile.department %}selected{% endif %} disabled>Select Branch</option>
                    <option value="Information Technology" {% if profile.department in ['IT', 'Information Technology'] %}selected{% endif %}>Information Technology (IT)</option>
                    <option value="Computer Engineering" {% if profile.department in ['CE', 'Computer Engineering'] %}selected{% endif %}>Computer Engineering (CE)</option>
                    <option value="Computer Science and Engineering" {% if profile.department in ['CS', 'Computer Science', 'Computer Science and Engineering'] %}selected{% endif %}>Computer Science and Engineering (CS)</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>B.Tech Year</label>
                    <select name="year" required style="width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #cbd5e1;">
                        {% for y in range(1, 5) %}
                            <option value="{{ y }}" {% if profile.year == y %}selected{% endif %}>Year {{ y }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Current Semester</label>
                    <select name="semester" required style="width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #cbd5e1;">
                        {% for s in range(1, 9) %}
                            <option value="{{ s }}" {% if profile.semester == s %}selected{% endif %}>Semester {{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            {% else %}
            <!-- Fake inputs so non-students don't error out, but hidden -->
            <input type="hidden" name="college" value="{{ profile.college }}">
            <input type="hidden" name="department" value="{{ profile.department }}">
            {% endif %}

            <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%;">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
