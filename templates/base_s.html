<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>{% block title %}Student Dashboard{% endblock %}</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--primary:#1e3c72;
--white:#ffffff;
}

body{
margin:0;
font-family:Arial;
background:var(--white);
}

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:var(--primary);
padding:15px;
color:white;
}

.sidebar h2{
text-align:center;
margin-bottom:25px;
}

.student-info{
text-align:center;
margin-bottom:25px;
}

.student-info img{
width:80px;
height:80px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.student-info h3{
margin:10px 0 2px 0;
font-size:18px;
}

.student-info p{
margin:0;
font-size:13px;
opacity:0.8;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

.logout{
margin-top:20px;
background:#c0392b;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:white;
padding:20px;
border-left:5px solid var(--primary);
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
color:var(--primary);
}

.card p{
font-size:22px;
font-weight:bold;
color:var(--primary);
}

.charts{
display:flex;
gap:20px;
}

.chart-box{
flex:1;
background:white;
padding:20px;
border-radius:8px;
border-left:5px solid var(--primary);
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<h2>Student Panel</h2>

<div class="student-info">

<img src="{{ url_for('static', filename='images/student.png') }}">

<h3>{{ session.get('name','Student') }}</h3>
<p>ID: {{ session.get('id','N/A') }}</p>

</div>

<nav>

<a href="/student">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="/s_profile">
<i class="fa-solid fa-user"></i> Profile
</a>

<a href="/performance_analysis">
<i class="fa-solid fa-chart-column"></i> Performance Analysis
</a>

<a href="/career_trajectory">
<i class="fa-solid fa-briefcase"></i> Career Trajectory
</a>

<a href="/attendance">
<i class="fa-solid fa-calendar-check"></i> Attendance
</a>

<a href="/logout" class="logout">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</nav>

</aside>

<!-- MAIN CONTENT -->

<main class="main">

{% block content %}
{% endblock %}

</main>

</div>

</body>
</html>
