<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{% block title %}Admin Dashboard{% endblock %}</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#1e3c72;
  --white:#ffffff;
}

body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#f5f6fa;
}

/* Sidebar */
.sidebar{
  width:240px;
  background:var(--primary);
  color:white;
  padding:20px;
  min-height:100vh;
}

.sidebar h2{
  text-align:center;
}

.sidebar a{
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
  margin:5px 0;
  border-radius:5px;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.2);
}

/* Main */
.main{
  flex:1;
  padding:20px;
}

.section{
  background:white;
  padding:20px;
  border-left:5px solid var(--primary);
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

button{
  background:var(--primary);
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

select,input{
  padding:6px;
  margin:5px 0;
  width:250px;
}

.logout{
margin-top:20px;
background:#c0392b;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<a href="/a_dashboard">Dashboard</a>
<a href="/upload">Upload Students</a>
<a href="/a_analytics">Overall Analytics</a>
<a href="/a_users">User Management</a>

<a href="/logout" class="logout">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>
</div>

<div class="main">

{% block content %}
{% endblock %}

</div>

</body>
</html>
